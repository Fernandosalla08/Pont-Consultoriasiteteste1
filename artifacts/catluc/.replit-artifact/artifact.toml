kind = "web"
previewPath = "/"
title = "CatLuc"
version = "1.0.0"
id = "artifacts/catluc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20777

[services.development]
run = "pnpm --filter @workspace/catluc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/catluc", "run", "build" ]
publicDir = "artifacts/catluc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20777"
BASE_PATH = "/"
