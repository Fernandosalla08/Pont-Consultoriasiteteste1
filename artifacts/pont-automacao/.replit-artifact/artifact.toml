kind = "web"
previewPath = "/pont-automacao/"
title = "Pont Automação"
version = "1.0.0"
id = "artifacts/pont-automacao"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/pont-automacao/" ]
localPort = 20101

[services.development]
run = "pnpm --filter @workspace/pont-automacao run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pont-automacao", "run", "build" ]
publicDir = "artifacts/pont-automacao/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20101"
BASE_PATH = "/pont-automacao/"
